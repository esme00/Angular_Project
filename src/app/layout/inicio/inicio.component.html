<div class="flex h-screen bg-gray-100">

    <!-- SIDEBAR -->
    <app-sidebar
        [abierto]="sidebarAbierto">
    </app-sidebar>


    <!-- CONTENIDO -->
    <div class="flex-1 p-12">

        <!-- HEADER -->
        <div class="flex items-center gap-6 mb-20">

            <button
                (click)="toggleSidebar()"
                class="text-3xl">

                <i class="bi bi-list"></i>

            </button>

            <div>

                <h1 class="text-6xl font-bold text-gray-800">
                    Dashboard
                </h1>

                <p class="text-2xl text-gray-500">
                    Mini panel administrativo
                </p>

            </div>

        </div>


        <!-- CARDS -->
        <div class="flex justify-center gap-24 mt-10">

            <!-- CARD CATEGORIAS -->
            <div
                routerLink="/categorias"
                class="w-[580px] h-[400px] bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center cursor-pointer transition hover:bg-purple-50 hover:scale-105">

                <i class="bi bi-tags text-9xl text-purple-500 mb-8"></i>

                <h2 class="text-5xl font-bold mb-3">
                    Categorías
                </h2>

                <p class="text-2xl text-gray-500">
                    Gestionar categorías
                </p>

            </div>


            <!-- CARD PRODUCTOS -->
            <div
                routerLink="/productos"
                class="w-[580px] h-[400px] bg-white rounded-2xl shadow-xl flex flex-col items-center justify-center cursor-pointer transition hover:bg-blue-50 hover:scale-105">

                <i class="bi bi-box-seam text-9xl text-blue-500 mb-8"></i>

                <h2 class="text-5xl font-bold mb-3">
                    Productos
                </h2>

                <p class="text-2xl text-gray-500">
                    Gestionar productos
                </p>

            </div>

        </div>

    </div>

</div>

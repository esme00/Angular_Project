<div class="flex h-screen bg-gray-100">

    <!-- LLAMADO DEL SIDERBAR -->
    <app-sidebar [abierto]="sidebarAbierto"></app-sidebar> 

    <div class="flex-1 overflow-auto p-8">
        <div class="flex items-center gap-4 mb-10">
            <button
                (click)="toggleSidebar()" 
                class="text-xl text-gray-600 hover:text-gray-800 transition">
                <i class="bi bi-list"></i>
            </button>
            <div>
                <h1 class="text-3xl font-bold text-gray-800">Projecto de Angular</h1>
                <p class="text-sm text-gray-500">Mini panel administrativo</p>
            </div>
        </div>

        <div class="flex justify-center gap-8 mt-6">
            <div
                routerLink="/categorias"
                class="w-64 h-48 bg-white rounded-2xl shadow-md flex flex-col items-center justify-center cursor-pointer transition hover:bg-purple-50 hover:scale-105">

                <i class="bi bi-tags text-5xl text-purple-500 mb-4"></i>
                <h2 class="text-xl font-bold mb-1">Categorías</h2>
                <p class="text-sm text-gray-500">Gestionar categorías</p>
            </div>

            <div
                routerLink="/productos"
                class="w-64 h-48 bg-white rounded-2xl shadow-md flex flex-col items-center justify-center cursor-pointer transition hover:bg-blue-50 hover:scale-105">

                <i class="bi bi-box-seam text-5xl text-blue-500 mb-4"></i>
                <h2 class="text-xl font-bold mb-1">Productos</h2>
                <p class="text-sm text-gray-500">Gestionar productos</p>
            </div>

        </div>

    </div>

</div>

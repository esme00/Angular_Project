<div class="flex h-screen bg-gray-100">
    <!-- LLAMADO DEL SIDER -->
    <app-sidebar [abierto]="sidebarAbierto"></app-sidebar>

    <div class="flex-1 overflow-auto p-8">
        <div class="flex items-center justify-between mb-8">

            <div class="flex items-center gap-4">

                <button
                    (click)="toggleSidebar()"
                    class="text-xl text-gray-600 hover:text-gray-800 transition">
                    <i class="bi bi-list"></i>
                </button>

                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Productos</h1>
                    <p class="text-sm text-gray-500 mt-1">Gestionar productos</p>
                </div>

            </div>

            <button
                class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition">
                <i class="bi bi-plus-lg"></i>
                Nuevo Producto
            </button>

        </div>


        <!-- TABLA -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

            <table class="w-full text-left">

                <thead class="bg-blue-50 text-blue-700 text-sm">
                    <tr>
                        <th class="px-6 py-4">#</th>
                        <th class="px-6 py-4">Nombre</th>
                        <th class="px-6 py-4">Precio</th>
                        <th class="px-6 py-4">Categoría</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>

                <tbody class="text-gray-700 text-sm divide-y divide-gray-100">

                    <tr class="hover:bg-gray-50 transition">

                        <td class="px-6 py-4 text-gray-400">1</td>
                        <td class="px-6 py-4 font-medium">Laptop</td>
                        <td class="px-6 py-4">$999.99</td>

                        <td class="px-6 py-4">
                            <span class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-medium">
                                Electrónica
                            </span>
                        </td>

                        <td class="px-6 py-4 flex justify-end gap-3">

                            <!-- BOTÓN EDITAR -->
                            <button class="text-blue-400 hover:text-blue-600 transition">
                                <i class="bi bi-pencil"></i>
                            </button>

                            <!-- BOTÓN ELIMINAR -->
                            <button class="text-red-400 hover:text-red-600 transition">
                                <i class="bi bi-trash"></i>
                            </button>

                        </td>

                    </tr>

                    <!-- PRODUCTOS NO CREADOS UN -->
                    <!-- <tr>
                        <td colspan="5" class="px-6 py-12 text-center text-gray-400 text-sm">
                            <i class="bi bi-box-seam text-3xl mb-2 block"></i>
                            No hay productos creados aún
                        </td>
                    </tr> -->

                </tbody>

            </table>

        </div>

    </div>

</div>

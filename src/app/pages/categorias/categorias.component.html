<div class="flex h-screen bg-gray-100">

    <!-- LLAMADO DEL SIDEBAR -->
    <app-sidebar [(abierto)]="sidebarAbierto"></app-sidebar>

    <div class="flex-1 overflow-auto p-4 md:p-8 min-w-0">

        <div class="flex items-center justify-between mb-6 md:mb-8">

            <div>
                <h1 class="text-xl md:text-3xl font-bold text-gray-800">Categorías</h1>
                <p class="text-xs md:text-sm text-gray-500 mt-1">Gestionar categorías</p>
            </div>

            <div class="flex items-center gap-2 md:gap-3">

                <!-- BUSCADOR -->
                <div class="relative">
                    <i class="bi bi-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    <input
                        [(ngModel)]="filtro"
                        type="text"
                        placeholder="Buscar..."
                        class="border border-gray-300 rounded-xl pl-8 pr-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400 w-32 md:w-48"/>
                </div>

                <!-- BOTÓN NUEVA CATEGORÍA -->
                <button (click)="abrirModal()"
                    class="flex items-center gap-1 md:gap-2 bg-purple-600 hover:bg-purple-700 text-white text-xs md:text-sm font-semibold px-3 md:px-4 py-2 rounded-xl transition">
                    <i class="bi bi-plus-lg"></i>
                    <span class="hidden sm:inline">Nueva Categoría</span>
                    <span class="sm:hidden">Nueva</span>
                </button>

            </div>

        </div>


        <!-- TABLA -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

            <table class="w-full text-left">

                <thead class="bg-purple-50 text-purple-700 text-sm">
                    <tr>
                        <th class="px-4 md:px-6 py-4">#</th>
                        <th class="px-4 md:px-6 py-4">Nombre</th>
                        <th class="px-4 md:px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>

                <tbody class="text-gray-700 text-sm divide-y divide-gray-100">
                    <!-- LISTADO DE CATEGORÍAS -->
                    <tr
                        *ngFor="let categoria of categoriaFiltradas"
                        class="hover:bg-gray-50 transition">

                        <td class="px-4 md:px-6 py-4 text-gray-400">
                            {{ categoria.id_categoria }}
                        </td>

                        <td class="px-4 md:px-6 py-4 font-medium">
                            {{ categoria.nombre_categoria }}
                        </td>

                        <td class="px-4 md:px-6 py-4 flex justify-end gap-3">
                            <!-- BOTON EDITAR -->
                            <button
                                (click)="editar(categoria)"
                                class="text-blue-400 hover:text-blue-600 transition">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <!-- BOTON ELIMINAR -->
                            <button
                                (click)="abrirModalEliminar(categoria.id_categoria)"
                                class="text-red-400 hover:text-red-600 transition">
                                <i class="bi bi-trash"></i>
                            </button>

                        </td>

                    </tr>

                    <tr *ngIf="categoriaFiltradas.length === 0">
                        <td colspan="3" class="px-6 py-12 text-center text-gray-400 text-sm">
                            <i class="bi bi-tags text-3xl mb-2 block"></i>
                            No hay categorías creadas aún
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- MODAL CREAR Y EDITAR -->
    <div
        *ngIf="modalAbierto"
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">

        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8 w-full max-w-md">

            <div class="flex items-center justify-between mb-6">

                <h2 class="text-xl font-bold text-gray-800">
                    {{ editando ? 'Editar Categoría' : 'Nueva Categoría' }}
                </h2>

                <button
                    (click)="cerrarModal()"
                    class="text-gray-400 hover:text-gray-600 transition text-xl">
                    <i class="bi bi-x-lg"></i>
                </button>

            </div>

            <form [formGroup]="form" (ngSubmit)="guardar()">

                <div class="flex flex-col gap-2 mb-6">

                    <label class="text-sm font-medium text-gray-600">
                        Nombre
                    </label>

                    <input
                        formControlName="nombre_categoria"
                        type="text"
                        placeholder="Ejemplo: Bebidas"
                        class="border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400"/>
                    <!-- VALIDACIÓN DEL CAMPO NOMBRE -->
                    <span
                        *ngIf="form.get('nombre_categoria')?.invalid && form.get('nombre_categoria')?.touched"
                        class="text-red-500 text-xs">
                        El nombre es requerido
                    </span>

                </div>

                <div class="flex justify-end gap-3">

                    <button
                        type="button"
                        (click)="cerrarModal()"
                        class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold px-6 py-2 rounded-xl transition">
                        Cancelar
                    </button>

                    <button
                        type="submit"
                        class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-6 py-2 rounded-xl transition">
                        {{ editando ? 'Guardar cambios' : 'Crear' }}
                    </button>

                </div>

            </form>

        </div>

    </div>

    <!-- MODAL PARA ELIMINAR -->
    <div *ngIf="modalEliminarAbierto" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-2xl shadow-xl p-6 md:p-8 w-full max-w-sm">
            <div class="flex flex-col items-center text-center gap-4">
                <div class="bg-red-100 rounded-full p-4">
                    <i class="bi bi-trash text-red-500 text-3xl"></i>
                </div>
                <h2 class="text-xl font-bold text-gray-800">
                    ¿Seguro que desea Eliminar categoría?
                </h2>
                <p class="text-sm text-gray-500">
                    Esta acción no se puede deshacer.
                </p>
                <div class="flex gap-3 w-full mt-2">
                    <!-- BOTÓN CANCELAR -->
                    <button (click)="cerrarModalEliminar()" class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold py-2 rounded-xl transition">
                        Cancelar
                    </button>
                    <!-- BOTÓN ELIMINAR -->
                    <button (click)="confirmarEliminar()" class="flex-1 bg-red-500 hover:bg-red-600 text-white text-sm font-semibold py-2 rounded-xl transition">
                        Sí, eliminar
                    </button>
                </div>
            </div>
        </div>
    </div>

</div>

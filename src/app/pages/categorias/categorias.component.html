<div class="flex h-screen bg-gray-100">

    <app-sidebar [abierto]="sidebarAbierto"></app-sidebar>

    <div class="flex-1 overflow-auto p-8">

        <div class="flex items-center justify-between mb-8">

            <div class="flex items-center gap-4">

                <button
                    (click)="toggleSidebar()"
                    class="text-xl text-gray-600 hover:text-gray-800 transition">
                    <i class="bi bi-list"></i>
                </button>

                <div>
                    <h1 class="text-3xl font-bold text-gray-800">Categorías</h1>
                    <p class="text-sm text-gray-500 mt-1">Gestionar categorías</p>
                </div>

            </div>

            <button
                (click)="abrirModal()"
                class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition">
                <i class="bi bi-plus-lg"></i>
                Nueva Categoría
            </button>

        </div>


        <!-- TABLA -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

            <table class="w-full text-left">

                <thead class="bg-purple-50 text-purple-700 text-sm">
                    <tr>
                        <th class="px-6 py-4">#</th>
                        <th class="px-6 py-4">Nombre</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>

                <tbody class="text-gray-700 text-sm divide-y divide-gray-100">

                    <tr
                        *ngFor="let categoria of categorias"
                        class="hover:bg-gray-50 transition">

                        <td class="px-6 py-4 text-gray-400">
                            {{ categoria.id_categoria }}
                        </td>

                        <td class="px-6 py-4 font-medium">
                            {{ categoria.nombre_categoria }}
                        </td>

                        <td class="px-6 py-4 flex justify-end gap-3">

                            <button
                                (click)="editar(categoria)"
                                class="text-blue-400 hover:text-blue-600 transition">
                                <i class="bi bi-pencil"></i>
                            </button>

                            <button
                                (click)="eliminar(categoria.id_categoria)"
                                class="text-red-400 hover:text-red-600 transition">
                                <i class="bi bi-trash"></i>
                            </button>

                        </td>

                    </tr>

                    <tr *ngIf="categorias.length === 0">
                        <td colspan="3" class="px-6 py-12 text-center text-gray-400 text-sm">
                            <i class="bi bi-tags text-3xl mb-2 block"></i>
                            No hay categorías creadas aún
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>


    <!-- MODAL -->
    <div
        *ngIf="modalAbierto"
        class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">

        <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">

            <div class="flex items-center justify-between mb-6">

                <h2 class="text-xl font-bold text-gray-800">
                    {{ editando ? 'Editar Categoría' : 'Nueva Categoría' }}
                </h2>

                <button
                    (click)="cerrarModal()"
                    class="text-gray-400 hover:text-gray-600 transition text-xl">
                    <i class="bi bi-x-lg"></i>
                </button>

            </div>

            <form [formGroup]="form" (ngSubmit)="guardar()">

                <div class="flex flex-col gap-2 mb-6">

                    <label class="text-sm font-medium text-gray-600">
                        Nombre
                    </label>

                    <input
                        formControlName="nombre_categoria"
                        type="text"
                        placeholder="Ej: Electrónica"
                        class="border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-400"/>

                    <span
                        *ngIf="form.get('nombre_categoria')?.invalid && form.get('nombre_categoria')?.touched"
                        class="text-red-500 text-xs">
                        El nombre es requerido
                    </span>

                </div>

                <div class="flex justify-end gap-3">

                    <button
                        type="button"
                        (click)="cerrarModal()"
                        class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold px-6 py-2 rounded-xl transition">
                        Cancelar
                    </button>

                    <button
                        type="submit"
                        class="bg-purple-600 hover:bg-purple-700 text-white text-sm font-semibold px-6 py-2 rounded-xl transition">
                        {{ editando ? 'Guardar cambios' : 'Crear' }}
                    </button>

                </div>

            </form>

        </div>

    </div>

</div>
